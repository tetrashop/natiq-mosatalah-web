<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نطق مصطلح - نسخه نهایی</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* سیستم اعتبار */
        .credit-system {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        /* سیستم کاربر */
        .user-system {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            cursor: pointer;
        }
        
        .search-box { 
            display: flex; 
            gap: 10px; 
            margin: 30px 0;
            flex-wrap: wrap;
        }
        input[type="text"] { 
            flex: 1; 
            padding: 15px; 
            border: 2px solid #e1e5e9; 
            border-radius: 12px; 
            font-size: 16px;
            min-width: 200px;
        }
        button { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
        }
        
        .phrase-example {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <!-- سیستم اعتبار - این باید حتماً نمایش داده شود -->
    <div class="credit-system" id="creditDisplay">
        💰 اعتبار: <span id="creditCount">15</span>
        <button onclick="addCredit(10)" style="background: white; color: #667eea; border: none; padding: 5px 10px; border-radius: 10px; margin-left: 10px; cursor: pointer; font-size: 12px;">
            + شارژ
        </button>
    </div>
    
    <!-- سیستم کاربر -->
    <div class="user-system" onclick="showUserMenu()">
        👤 کاربر مهمان
    </div>

    <div class="container">
        <h1>نطق مصطلح 🎯</h1>
        <p>پایگاه داده جامع عبارات، ضرب المثل‌ها و اصطلاحات فارسی</p>
        
        <div class="search-box">
            <input type="text" placeholder="عبارت مورد نظر را جستجو کنید..." id="searchInput">
            <button onclick="performSearch()">🔍 جستجو</button>
            <button onclick="startVoiceSearch()" style="background: linear-gradient(135deg, #4CAF50, #45a049);">🎤 جستجوی صوتی</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">+1500</div>
                <div>عبارت فارسی</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">12</div>
                <div>دسته‌بندی</div>
            </div>
        </div>
        
        <div style="margin: 30px 0;">
            <h3>💡 نمونه اصطلاحات:</h3>
            
            <div class="phrase-example">
                <strong>آب از آسیاب افتادن</strong>
                <p>آرام شدن اوضاع و شرایط</p>
                <div style="margin-top: 10px;">
                    <button onclick="sharePhrase('آب از آسیاب افتادن', 'آرام شدن اوضاع و شرایط')" style="background: #667eea; font-size: 12px; padding: 8px 15px;">📤 اشتراک‌گذاری</button>
                    <button onclick="addToFavorites('آب از آسیاب افتادن', 'آرام شدن اوضاع و شرایط')" style="background: #ff9a9e; font-size: 12px; padding: 8px 15px;">⭐ علاقه‌مندی</button>
                </div>
            </div>
            
            <div class="phrase-example" style="background: #e8f5e8;">
                <strong>دست به عصا راه رفتن</strong>
                <p>با احتیاط بسیار رفتار کردن</p>
                <div style="margin-top: 10px;">
                    <button onclick="sharePhrase('دست به عصا راه رفتن', 'با احتیاط بسیار رفتار کردن')" style="background: #4CAF50; font-size: 12px; padding: 8px 15px;">📤 اشتراک‌گذاری</button>
                    <button onclick="addToFavorites('دست به عصا راه رفتن', 'با احتیاط بسیار رفتار کردن')" style="background: #ff9a9e; font-size: 12px; padding: 8px 15px;">⭐ علاقه‌مندی</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ==================== سیستم اعتبار ====================
    let userCredit = localStorage.getItem('natiqCredit') || 15;
    let searchHistory = JSON.parse(localStorage.getItem('natiqSearchHistory')) || [];
    let favorites = JSON.parse(localStorage.getItem('natiqFavorites')) || [];
    
    function updateCreditDisplay() {
        document.getElementById('creditCount').textContent = userCredit;
        localStorage.setItem('natiqCredit', userCredit);
    }
    
    function addCredit(amount = 10) {
        userCredit += amount;
        updateCreditDisplay();
        showNotification(`🎉 ${amount} اعتبار اضافه شد!`, 'success');
    }
    
    function performSearch() {
        const searchTerm = document.getElementById('searchInput').value;
        if (!searchTerm.trim()) {
            showNotification('❌ لطفاً عبارت مورد نظر را وارد کنید', 'error');
            return;
        }
        
        if (userCredit > 0) {
            userCredit--;
            updateCreditDisplay();
            
            // افزودن به تاریخچه
            searchHistory.unshift({
                term: searchTerm,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('natiqSearchHistory', JSON.stringify(searchHistory));
            
            showNotification(`🔍 جستجوی "${searchTerm}" انجام شد! (۱ اعتبار کسر شد)`, 'success');
        } else {
            showNotification('❌ اعتبار کافی نیست! لطفاً حساب خود را شارژ کنید.', 'error');
            showPaymentModal();
        }
    }
    
    function showPaymentModal() {
        const modalHTML = `
            <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:2000;">
                <div style="background:white; padding:30px; border-radius:20px; text-align:center; max-width:400px; width:90%;">
                    <h3>💳 شارژ حساب</h3>
                    <p>برای ادامه استفاده از نطق مصطلح، حساب خود را شارژ کنید.</p>
                    <div style="margin:20px 0;">
                        <button onclick="addCredit(5); this.closest('div').parentElement.remove();" style="background:linear-gradient(135deg, #667eea, #764ba2); color:white; border:none; padding:12px 20px; border-radius:10px; margin:5px; cursor:pointer; width:100%;">۵ اعتبار - ۵,۰۰۰ تومان</button>
                        <button onclick="addCredit(20); this.closest('div').parentElement.remove();" style="background:linear-gradient(135deg, #4CAF50, #45a049); color:white; border:none; padding:12px 20px; border-radius:10px; margin:5px; cursor:pointer; width:100%;">۲۰ اعتبار - ۱۵,۰۰۰ تومان</button>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" style="background:#ff4757; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; width:100%;">بستن</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
    }
    
    // ==================== سیستم کاربر ====================
    function showUserMenu() {
        const modalHTML = `
            <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:2000;">
                <div style="background:white; padding:25px; border-radius:20px; max-width:400px; width:90%; max-height:80%; overflow-y:auto;">
                    <h3>👤 پنل کاربری</h3>
                    
                    <div style="margin:15px 0;">
                        <h4>📊 آمار</h4>
                        <p>تاریخچه جستجو: ${searchHistory.length} مورد</p>
                        <p>علاقه‌مندی‌ها: ${favorites.length} مورد</p>
                        <p>اعتبار فعلی: ${userCredit}</p>
                    </div>
                    
                    <div style="margin:15px 0;">
                        <button onclick="showSearchHistory()" style="background:#667eea; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; width:100%; margin:5px 0;">📜 تاریخچه جستجو</button>
                        <button onclick="showFavorites()" style="background:#ff9a9e; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; width:100%; margin:5px 0;">⭐ علاقه‌مندی‌ها</button>
                    </div>
                    
                    <button onclick="this.parentElement.parentElement.remove()" style="background:#667eea; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; width:100%;">بستن</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
    }
    
    function showSearchHistory() {
        let historyHTML = '<h4>📜 تاریخچه جستجو</h4>';
        if (searchHistory.length === 0) {
            historyHTML += '<p>موردی یافت نشد</p>';
        } else {
            searchHistory.slice(0, 10).forEach(item => {
                historyHTML += `<div style="padding:8px; border-bottom:1px solid #eee;">${item.term}</div>`;
            });
        }
        alert(historyHTML);
    }
    
    function showFavorites() {
        let favoritesHTML = '<h4>⭐ علاقه‌مندی‌ها</h4>';
        if (favorites.length === 0) {
            favoritesHTML += '<p>موردی یافت نشد</p>';
        } else {
            favorites.forEach(item => {
                favoritesHTML += `<div style="padding:8px; border-bottom:1px solid #eee;"><strong>${item.phrase}</strong><br>${item.meaning}</div>`;
            });
        }
        alert(favoritesHTML);
    }
    
    // ==================== سایر قابلیت‌ها ====================
    function startVoiceSearch() {
        showNotification('🎤 جستجوی صوتی فعال شد! (در نسخه کامل)', 'info');
    }
    
    function sharePhrase(phrase, meaning) {
        const text = `📚 ${phrase}\n${meaning}\n\n🔍 از طریق نطق مصطلح\n🌐 https://sensational-croquembouche-457830.netlify.app`;
        
        if (navigator.share) {
            navigator.share({
                title: phrase,
                text: text
            });
        } else {
            navigator.clipboard.writeText(text);
            showNotification('✅ متن با موفقیت کپی شد!', 'success');
        }
    }
    
    function addToFavorites(phrase, meaning) {
        const existing = favorites.find(fav => fav.phrase === phrase);
        if (!existing) {
            favorites.push({ phrase, meaning, timestamp: new Date().toISOString() });
            localStorage.setItem('natiqFavorites', JSON.stringify(favorites));
            showNotification(`✅ "${phrase}" به علاقه‌مندی‌ها اضافه شد!`, 'success');
        } else {
            showNotification(`ℹ️ "${phrase}" قبلاً در علاقه‌مندی‌ها موجود است.`, 'info');
        }
    }
    
    function showNotification(message, type = 'info') {
        // ایجاد نوتیفیکیشن ساده
        alert(message);
    }
    
    // ==================== راه‌اندازی اولیه ====================
    document.addEventListener('DOMContentLoaded', function() {
        updateCreditDisplay();
        console.log('🚀 نطق مصطلح - نسخه نهایی فعال شد!');
        console.log('💰 اعتبار کاربر:', userCredit);
        console.log('📊 تاریخچه جستجو:', searchHistory.length, 'مورد');
        console.log('⭐ علاقه‌مندی‌ها:', favorites.length, 'مورد');
    });
    
    // اضافه کردن event listener برای Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
    </script>
</body>
</html>
